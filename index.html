<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎓 졸업 이수 학점 계산기 </title>
    <style>
        /* === 다크 골드 테마 적용 === */
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #121212; color: #e0e0e0; line-height: 1.6; }
        .container { max-width: 950px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 2px solid #d4af37; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15); }
        h2 { text-align: center; color: #f1c40f; margin-bottom: 25px; font-weight: 800; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        
        .config-box { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 25px; display: flex; gap: 20px; justify-content: center; align-items: center; border: 1px solid #444; }
        .config-box label { color: #d4af37; }
        .config-box select { padding: 6px; border-radius: 4px; border: 1px solid #d4af37; background: #333; color: white; font-weight: bold; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 10px; border-bottom: 2px solid #d4af37; padding-bottom: 5px; }
        .section-title { font-size: 1.2em; font-weight: bold; color: #f1c40f; }
        .sub-header { margin-top: 15px; background: #2a2a2a; padding: 10px; border-radius: 5px; font-weight: bold; color: #e0e0e0; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #d4af37; }
        
        button.add-btn { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #000; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9em; font-weight: bold; box-shadow: 0 2px 5px rgba(212, 175, 55, 0.4); }
        button.add-btn:hover { background: linear-gradient(135deg, #f1c40f, #d4af37); transform: translateY(-1px); }
        button.reset-btn { background: #c0392b; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9em; font-weight: bold; margin-left: 10px; }
        button.reset-btn:hover { background: #e74c3c; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #222; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; vertical-align: middle; }
        th { background: #2a2a2a; color: #d4af37; font-size: 0.9em; }
        
        select, input[type="text"], input[type="number"] { width: 95%; padding: 8px; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; text-align: center; background: #333; color: #fff; }
        .other-input { margin-top: 8px; border: 1px dashed #d4af37; background-color: #2a2a2a; display: none; }
        
        .checkbox-group { display: flex; gap: 20px; justify-content: center; padding: 15px; background: #222; border: 1px solid #444; border-radius: 8px; font-weight: bold; flex-wrap: wrap; }
        .checkbox-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; color: #ccc; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; accent-color: #d4af37; }

        .auto-domain { font-weight: bold; color: #f1c40f; background: #333; padding: 4px 10px; border-radius: 12px; display: inline-block; border: 1px solid #555; }

        .result-panel { background: #000; color: #fff; padding: 25px; border-radius: 10px; margin-top: 35px; border: 1px solid #d4af37; position: relative; }
        .result-title { font-size: 1.2em; border-bottom: 1px solid #d4af37; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; display: flex; justify-content: space-between; color: #f1c40f; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; }
        .highlight { color: #f1c40f; font-weight: bold; font-size: 1.3em; }
        .free-credit { color: #e74c3c; font-weight: bold; }
        
        .status-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        .status-item { background: #1a1a1a; padding: 15px; border-radius: 6px; border: 1px solid #444; }
        .status-item h4 { margin: 0 0 10px 0; color: #d4af37; border-bottom: 1px dashed #555; padding-bottom: 5px; }
        
        .pass { color: #2ecc71; font-weight: bold; text-shadow: 0 0 5px rgba(46, 204, 113, 0.4); }
        .fail { color: #e74c3c; font-weight: bold; }
        .missing-list { color: #bdc3c7; font-size: 0.9em; margin-top: 5px; display: block; font-style: italic; }
        option:disabled { color: #777; font-style: italic; background: #222; }

        /* === 졸업 학점 진행도 (Progress Bar) CSS === */
        .progress-wrapper { margin-top: 10px; margin-bottom: 30px; padding: 0 15px; }
        .progress-text { text-align: right; font-size: 1em; color: #d4af37; font-weight: bold; margin-bottom: 25px; }
        .progress-container { width: 100%; background: #333; height: 20px; border-radius: 10px; position: relative; border: 1px solid #d4af37; box-shadow: inset 0 0 5px #000; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #8a6d1c, #f1c40f); border-radius: 10px; width: 0%; transition: width 0.8s ease-in-out; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .progress-icon { position: absolute; top: -35px; width: 65px; height: 65px; transform: translateX(-50%); transition: left 0.8s ease-in-out; z-index: 10; left: 0%;  }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 졸업 이수 학점 계산기</h2>

    <div class="config-box">
        <div>
            <label>학번 구분: </label>
            <select id="studentYear" onchange="handleYearChange()">
                <option value="2024">24학번 이후</option>
                <option value="2023">24학번 이전</option>
            </select>
        </div>
        <div>
            <label>복수전공 여부: </label>
            <select id="isDoubleMajor" onchange="toggleDoubleMajor()">
                <option value="no">단일전공 (목표: 135학점)</option>
                <option value="computer">복수전공 - 컴퓨터 (목표: 156학점)</option>
                <option value="ethics">복수전공 - 윤리 (목표: 156학점)</option>
                <option value="social">복수전공 - 일반사회 (목표: 156학점)</option>
                <option value="geography">복수전공 - 지리 (목표: 156학점)</option>
                <option value="other">복수전공 - 기타  (목표: 156학점)</option>
            </select>
        </div>
    </div>

    <div class="section-header"><div class="section-title">📚 교양 영역</div></div>

    <div class="sub-header"><span>🌱 청람인성 </span></div>
    <div class="checkbox-group">
        <label><input type="checkbox" class="inseong-chk" value="교원 인성의 실천" data-credit="1" onchange="calculate()"> 교원 인성의 실천</label>
        <label><input type="checkbox" class="inseong-chk" value="더불어 사는 시민 인성" data-credit="1" onchange="calculate()"> 더불어 사는 시민 인성</label>
        <label><input type="checkbox" class="inseong-chk" value="청람인의 책임과 실천" data-credit="1" onchange="calculate()"> 청람인의 책임과 실천</label>
    </div>

    <div class="sub-header">
        <span>🚀 청람역량, 청람탐구</span>
        <button class="add-btn" onclick="addGyoyangRow()">+ 추가</button>
    </div>
    <table>
        <colgroup><col width="45%"><col width="30%"><col width="25%"></colgroup>
        <thead><tr><th>과목 선택</th><th>분류 영역 (자동)</th><th>학점</th></tr></thead>
        <tbody id="combinedGyoyangTable"></tbody>
    </table>

    <div class="section-header">
        <div class="section-title">🏫 교직 영역 </div>
        <button class="add-btn" onclick="addTeachingRow()">+ 추가</button>
    </div>
    <table>
        <colgroup><col width="75%"><col width="25%"></colgroup>
        <thead><tr><th>과목 선택</th><th>학점</th></tr></thead>
        <tbody id="teachingTable"></tbody>
    </table>

    <div class="section-header">
        <div class="section-title">🎒 교육실습 및 필수 이수 (P/F)</div>
    </div>
    <div class="checkbox-group">
        <label><input type="checkbox" class="prac-chk" id="chk-prac1" value="교육실습1" onchange="calculate()"> 교육실습1 </label>
        <label><input type="checkbox" class="prac-chk" id="chk-prac2" value="교육실습2" onchange="calculate()"> 교육실습2 </label>
        <label><input type="checkbox" class="prac-chk" id="chk-cpr" value="응급처치" onchange="calculate()"> 응급처치 (P/F)</label>
        <label><input type="checkbox" class="prac-chk" id="chk-vol" value="교육봉사" onchange="calculate()"> 교육봉사(60시간)</label>
    </div>

    <div class="section-header">
        <div class="section-title">📖 전공 영역 </div>
        <button class="add-btn" onclick="addMajorRow()">+ 추가</button>
    </div>
    <table>
        <colgroup><col width="75%"><col width="25%"></colgroup>
        <thead><tr><th>과목 선택</th><th>학점</th></tr></thead>
        <tbody id="majorTable"></tbody>
    </table>

    <div id="doubleMajorSection" style="display:none;">
        <div class="section-header">
            <div class="section-title" id="doubleMajorTitleSpan">💻 복수전공 영역</div>
            <button class="add-btn" onclick="addDoubleMajorRow()">+ 추가</button>
        </div>
        <table>
            <colgroup><col width="75%"><col width="25%"></colgroup>
            <thead><tr><th>과목 선택/입력</th><th>학점</th></tr></thead>
            <tbody id="doubleMajorTable"></tbody>
        </table>
    </div>

    <div class="result-panel">
        <div class="result-title">
            <span>📊 졸업 이수 현황 및 진단</span>
            <button class="reset-btn" onclick="resetData()">기록 초기화</button>
        </div>

        <div class="progress-wrapper">
            <div class="progress-text" id="progressText">0% 달성</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <img src="iconn.png" class="progress-icon" id="progressIcon" alt="아이콘">
            </div>
        </div>
        <div class="grid-3">
            <div>목표 총 학점<br><span id="targetTotal" class="highlight" style="color:white;">135</span>점</div>
            <div>현재 이수 학점<br><span id="currentTotal" class="highlight">0</span>점</div>
            <div>자유(잔여) 학점<br><span id="freeTotal" class="free-credit">0</span>점</div>
        </div>
        <div style="text-align: center; margin-top: 20px; font-size: 1.5em;" id="finalResultText">남은 학점: 135점</div>
        <div class="status-box" id="diagnosticStatus"></div>
    </div>
</div>

<script>
    const sortKor = (a, b) => a.localeCompare(b, 'ko');
    const sortObjKor = (a, b) => a.교과목명.localeCompare(b.교과목명, 'ko');

    const rawGyoyangData = {

    function toggleDoubleMajor() {
        const isDouble = document.getElementById("isDoubleMajor").value;
        const section = document.getElementById("doubleMajorSection");
        const titleSpan = document.getElementById("doubleMajorTitleSpan");
        
        if (isDouble === "no") {
            section.style.display = "none";

            section.style.display = "block";
            if (isDouble === "computer") titleSpan.innerText = "💻 복수전공 영역 (컴퓨터)";
            else if (isDouble === "ethics") titleSpan.innerText = "⚖️ 복수전공 영역 (윤리)";
            else if (isDouble === "social") titleSpan.innerText = "🌍 복수전공 영역 (일반사회)";
            else if (isDouble === "geography") titleSpan.innerText = "🗺️ 복수전공 영역 (지리)";
            else if (isDouble === "other") titleSpan.innerText = "💡 복수전공 영역 (기타)";
            
            const tbody = document.getElementById("doubleMajorTable");
            const currentRows = Array.from(tbody.querySelectorAll("tr")).map(tr => {
                const sel = tr.querySelector(".d-select");
                const other = tr.querySelector(".other-input");
                return {
                    sel: sel ? sel.value : "other",
                    other: other ? other.value : "",
                    cred: tr.querySelector(".d-credit").value
                };
            });
            
            tbody.innerHTML = "";
            
            if (currentRows.length > 0) {
                currentRows.forEach(val => {
                    addDoubleMajorRow();
                    const tr = tbody.lastElementChild;
                    const sel = tr.querySelector(".d-select");
                    
                    if (isDouble === "other") {
                        tr.querySelector(".other-input").value = val.other || val.sel;
                        tr.querySelector(".d-credit").value = val.cred || "0";
                    } else if (sel) {
                        let optionExists = Array.from(sel.options).some(opt => opt.value === val.sel);
                        sel.value = optionExists ? val.sel : "";
                        handleCommonSelectChange(sel, 'd-credit');
                        if (sel.value === "other") tr.querySelector(".other-input").value = val.other;
                        tr.querySelector(".d-credit").value = val.cred || "0";
                    }
                });
            } else {
                for(let i=0; i<3; i++) addDoubleMajorRow();
            }
        }
        calculate();
    }

    function handleCommonSelectChange(selectElem, creditClass="m-credit") {
        const inputElem = selectElem.nextElementSibling;
        const creditElem = selectElem.closest("tr").querySelector(`.${creditClass}`);
        if (selectElem.value === "other") {
            inputElem.style.display = "block";
            if (creditElem && creditElem.value === "0") creditElem.value = "3";
        } else if (selectElem.value !== "") {
            inputElem.style.display = "none"; inputElem.value = "";
            if (creditElem) creditElem.value = "3";
        } else {
            inputElem.style.display = "none"; inputElem.value = "";
            if (creditElem) creditElem.value = "0";
        }
        updateSelects(); calculate();
    }

    function updateSelects() {
        ['g-select', 't-select', 'm-select', 'd-select'].forEach(className => {
            const selects = document.querySelectorAll(`.${className}`);
            const selectedVals = Array.from(selects).map(s => s.value).filter(v => v !== "" && v !== "other");
            selects.forEach(select => {
                Array.from(select.options).forEach(opt => {
                    if (opt.value !== "" && opt.value !== "other") {
                        opt.disabled = selectedVals.includes(opt.value) && select.value !== opt.value;
                    }
                });
            });
        });
    }

    function loadData() {
        const saved = localStorage.getItem("gradCalcData");
        if (saved) {
            const data = JSON.parse(saved);
            
            document.getElementById("studentYear").value = data.year || "2024";
            document.getElementById("isDoubleMajor").value = data.doubleMajor || "no";
            
            const chks = document.querySelectorAll(".inseong-chk");
            if (data.inseong) data.inseong.forEach((checked, i) => { if (chks[i]) chks[i].checked = checked; });

            const pChks = document.querySelectorAll(".prac-chk");
            if (data.prac) data.prac.forEach((checked, i) => { if (pChks[i]) pChks[i].checked = checked; });

            document.getElementById("combinedGyoyangTable").innerHTML = ""; document.getElementById("teachingTable").innerHTML = "";
            document.getElementById("majorTable").innerHTML = ""; document.getElementById("doubleMajorTable").innerHTML = "";

            if (data.gyoyang && data.gyoyang.length > 0) {
                data.gyoyang.forEach(row => {
                    addGyoyangRow(); const tr = document.getElementById("combinedGyoyangTable").lastElementChild;
                    const select = tr.querySelector(".g-select"); select.value = row.course; handleGyoyangChange(select);
                    tr.querySelector(".other-input").value = row.otherCourse || ""; tr.querySelector(".g-other-domain").value = row.otherDomain || ""; tr.querySelector(".g-credit").value = row.credit || "0";
                });
            } else { for(let i=0; i<4; i++) addGyoyangRow(); }

            updateTeachingOptions();

            if (data.teaching && data.teaching.length > 0) {
                data.teaching.forEach(row => {
                    addTeachingRow(); const tr = document.getElementById("teachingTable").lastElementChild;
                    tr.querySelector(".t-select").value = row.course || "";
                });
            } else { for(let i=0; i<3; i++) addTeachingRow(); }

            if (data.major && data.major.length > 0) {
                data.major.forEach(row => {
                    addMajorRow(); const tr = document.getElementById("majorTable").lastElementChild;
                    const select = tr.querySelector(".m-select"); select.value = row.course || ""; handleCommonSelectChange(select, "m-credit");
                    tr.querySelector(".other-input").value = row.otherCourse || "";
                });
            } else { for(let i=0; i<3; i++) addMajorRow(); }

            toggleDoubleMajor();
            document.getElementById("doubleMajorTable").innerHTML = ""; 
            if (data.double && data.double.length > 0 && data.doubleMajor !== "no") {
                data.double.forEach(row => {
                    addDoubleMajorRow(); const tr = document.getElementById("doubleMajorTable").lastElementChild;
                    const select = tr.querySelector(".d-select"); 
                    if (select) {
                        let optExists = Array.from(select.options).some(opt => opt.value === row.course);
                        select.value = optExists ? row.course : "";
                        if(row.course === "other") select.value = "other";
                        handleCommonSelectChange(select, "d-credit");
                    }
                    const otherInput = tr.querySelector(".other-input");
                    if (otherInput) otherInput.value = row.otherCourse || ""; 
                    tr.querySelector(".d-credit").value = row.credit || "0";
                });
            } else if (data.doubleMajor !== "no") { for(let i=0; i<3; i++) addDoubleMajorRow(); }
            
        } else {
            for(let i=0; i<4; i++) addGyoyangRow();
            for(let i=0; i<3; i++) addTeachingRow(); addMajorRow(); addDoubleMajorRow();
        }
        updateSelects(); calculate(false);
    }

    // --- 핵심 계산 및 진단 ---
    function calculate(doSave = true) {
        const year = document.getElementById("studentYear").value;
        const isDouble = document.getElementById("isDoubleMajor").value;
        // 단일전공 목표 학점을 135학점으로 변경
        const targetTotal = (isDouble !== "no") ? 156 : 135;
        document.getElementById("targetTotal").innerText = targetTotal;

        // 교육실습 및 필수 확인
        let pracSum = 0;
        const prac1 = document.getElementById("chk-prac1").checked;
        const prac2 = document.getElementById("chk-prac2").checked;
        const cpr = document.getElementById("chk-cpr").checked;
        const vol = document.getElementById("chk-vol").checked;

        if (prac1) pracSum += 2;
        if (prac2) pracSum += 2;
        // 교육봉사 체크 시 2학점 추가
        if (vol) pracSum += 2; 
        
        const pracPass = prac1 && prac2 && cpr && vol;

        // 교양
        let iCount = 0; document.querySelectorAll(".inseong-chk").forEach(chk => { if (chk.checked) iCount++; });
        let ySum = 0, tqSum = 0; const ySet = new Set(), tqSet = new Set();
        document.querySelectorAll("#combinedGyoyangTable tr").forEach(tr => {
            const selectElem = tr.querySelector(".g-select");
            let domain = ""; let credit = parseFloat(tr.querySelector(".g-credit").value) || 0;
            if (selectElem.value === "other") domain = tr.querySelector(".g-other-domain").value;
            else if (selectElem.value !== "") domain = courseDict[selectElem.value].domain;
            if (domain && credit > 0) {
                if (yeokryangDomains.includes(domain)) { ySum += credit; ySet.add(domain); }
                else if (tamguDomains.includes(domain)) { tqSum += credit; tqSet.add(domain); }
            }
        });
        const totalGyoyang = iCount + ySum + tqSum;

        // 교직 & 역사전공
        let tSum = 0, mSum = 0;
        let teachManCount = 0, teachTheoCount = 0;
        const selectedTeach = new Set(), selectedMajor = new Set();
        
        document.querySelectorAll(".t-select").forEach(el => {
            if (el.value) { 
                tSum += 2; selectedTeach.add(el.value); 
                if(teachMandatory.includes(el.value)) teachManCount++;
                if(teachTheory.includes(el.value)) teachTheoCount++;
            }
        });

        let mBasicCount = 0, mSelectCount = 0;
        document.querySelectorAll(".m-select").forEach(el => {
            if (el.value) { 
                mSum += 3; 
                if(majorBasic.includes(el.value)) { mBasicCount++; selectedMajor.add(el.value); }
                else mSelectCount++;
            }
        });

        // 복수전공 (단일전공일 때도 입력된 학점을 합산하여 자유학점으로 넘기도록 수정)
        let dSum = 0;
        const selectedDouble = new Set();
        // 화면에 보이지 않더라도 입력된 값이 있다면 모두 가져와서 더함
        document.querySelectorAll("#doubleMajorTable tr").forEach(tr => {
            const select = tr.querySelector(".d-select");
            const val = select ? select.value : "other";
            const credit = parseFloat(tr.querySelector(".d-credit").value) || 0;
            if (val && val !== "other") selectedDouble.add(val);
            dSum += credit;
        });

        // 총 학점 계산 (단일전공 시에도 복수전공 입력 학점 dSum 이 합산됨)
        const total = totalGyoyang + tSum + mSum + dSum + pracSum;
        document.getElementById("currentTotal").innerText = total;

        // 🚀 진행도(Progress Bar) 업데이트 로직 🚀
        let percent = (total / targetTotal) * 100;
        if (percent > 100) percent = 100; // 최대 100%까지만 표시
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("progressIcon").style.left = percent + "%";
        document.getElementById("progressText").innerText = `${Math.floor(percent)}% 달성`;

        const reqGyoyang = (year === "2024") ? 23 : 25;
        const reqTeachTotal = (year === "2024") ? 26 : 24;
        const reqTeachMan = (year === "2024") ? 4 : 3;
        const reqDoubleTotal = 50; 
        
        let doubleDiagHtml = "";
        let doublePass = false;

        // 복수전공 진단창은 복수전공을 선택했을 때만 표시됨
        if (isDouble === "computer") {
            let dEduCount = 0;
            selectedDouble.forEach(val => { if (doubleEduBasic.includes(val) || doubleEduSelect.includes(val)) dEduCount++; });
            
            let missingDoubleBasicGroups = [];
            if (!selectedDouble.has("C프로그래밍")) missingDoubleBasicGroups.push("C프로그래밍");
            if (!(selectedDouble.has("알고리즘") || selectedDouble.has("이산수학") || selectedDouble.has("인공지능"))) missingDoubleBasicGroups.push("택1(알고리즘/이산수학/인공지능)");
            if (!(selectedDouble.has("자료구조") || selectedDouble.has("데이터베이스"))) missingDoubleBasicGroups.push("택1(자료구조/데이터베이스)");
            if (!(selectedDouble.has("운영체제") || selectedDouble.has("컴퓨터네트워크"))) missingDoubleBasicGroups.push("택1(운영체제/네트워크)");
            if (!(selectedDouble.has("컴퓨터구조") || selectedDouble.has("논리회로"))) missingDoubleBasicGroups.push("택1(컴퓨터구조/논리회로)");
            if (!(selectedDouble.has("정보통신윤리") || selectedDouble.has("소프트웨어공학"))) missingDoubleBasicGroups.push("택1(정보통신윤리/소프트웨어공학)");

            const doubleBasicPass = (missingDoubleBasicGroups.length === 0);
            let missingDoubleEdu = [...doubleEduBasic, ...doubleEduSelect].filter(m => !selectedDouble.has(m));
            
            doublePass = (dSum >= reqDoubleTotal) && (dEduCount >= 3) && doubleBasicPass;
            
            doubleDiagHtml = `
                <div class="status-item">
                    <h4>💻 복수전공 이수 진단 (컴퓨터)</h4>
                    - 교과교육 (3과목 필수): ${dEduCount >= 3 ? '<span class="pass">[충족]</span>' : `<span class="fail">[${dEduCount}/3 미달]</span>`}
                      ${missingDoubleEdu.length > 0 ? `<span class="missing-list">(미이수: ${missingDoubleEdu.join(", ")})</span>` : ''}
                    - 교과내용 기본 (필수 6개 군 충족): ${doubleBasicPass ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                      ${missingDoubleBasicGroups.length > 0 ? `<span class="missing-list">(미이수: ${missingDoubleBasicGroups.join(", ")})</span>` : ''}
                    - 총 학점 (현재 ${dSum}/${reqDoubleTotal}): ${dSum >= reqDoubleTotal ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                </div>
            `;
        } else if (isDouble === "ethics") {
            let eEduCount = 0; let missingEthicsEdu = [];
            ethicsEduMandatory.forEach(m => {
                if (selectedDouble.has(m)) eEduCount++; else missingEthicsEdu.push(m);
            });
            
            let eGrp1Count = 0; ethicsContentGroup1.forEach(m => { if (selectedDouble.has(m)) eGrp1Count++; });
            let eGrp2Count = 0; ethicsContentGroup2.forEach(m => { if (selectedDouble.has(m)) eGrp2Count++; });

            const ethicsEduPass = (eEduCount === 3);
            const ethicsGrp1Pass = (eGrp1Count >= 3);
            const ethicsGrp2Pass = (eGrp2Count >= 3);
            
            doublePass = (dSum >= reqDoubleTotal) && ethicsEduPass && ethicsGrp1Pass && ethicsGrp2Pass;

            doubleDiagHtml = `
                <div class="status-item">
                    <h4>⚖️ 복수전공 이수 진단 (윤리)</h4>
                    - 교과교육 (필수 3과목): ${ethicsEduPass ? '<span class="pass">[충족]</span>' : `<span class="fail">[${eEduCount}/3 미달]</span>`}
                      ${missingEthicsEdu.length > 0 ? `<span class="missing-list">(미이수: ${missingEthicsEdu.join(", ")})</span>` : ''}
                    - 교과내용 기본 Group 1 (택 3): ${ethicsGrp1Pass ? '<span class="pass">[충족]</span>' : `<span class="fail">[${eGrp1Count}/3 미달]</span>`}
                    - 교과내용 기본 Group 2 (택 3): ${ethicsGrp2Pass ? '<span class="pass">[충족]</span>' : `<span class="fail">[${eGrp2Count}/3 미달]</span>`}
                    - 총 학점 (현재 ${dSum}/${reqDoubleTotal}): ${dSum >= reqDoubleTotal ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                </div>
            `;
        } else if (isDouble === "social") {
            let missingSocEdu = [];
            if (!selectedDouble.has("사회과교육론")) missingSocEdu.push("사회과교육론");
            if (!selectedDouble.has("일반사회와논술")) missingSocEdu.push("일반사회와논술");
            if (!(selectedDouble.has("일반사회교수론") || selectedDouble.has("일반사회교재론"))) missingSocEdu.push("택1(교수론/교재론)");

            const socEduPass = (missingSocEdu.length === 0);
            
            let missingSocContentBasic = [];
            let sBasicCount = 0;
            socContentBasic.forEach(m => {
                if (selectedDouble.has(m)) sBasicCount++;
                else missingSocContentBasic.push(m);
            });
            const reqSocContentBasic = socContentBasic.length;
            const socBasicPass = (sBasicCount === reqSocContentBasic);

            doublePass = (dSum >= reqDoubleTotal) && socEduPass && socBasicPass;

            doubleDiagHtml = `
                <div class="status-item">
                    <h4>🌍 복수전공 이수 진단 (일반사회)</h4>
                    - 교과교육 (필수 3과목): ${socEduPass ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                      ${missingSocEdu.length > 0 ? `<span class="missing-list">(미이수: ${missingSocEdu.join(", ")})</span>` : ''}
                    - 교과내용 기본 (8과목 필수): ${socBasicPass ? '<span class="pass">[충족]</span>' : `<span class="fail">[${sBasicCount}/${reqSocContentBasic} 미달]</span>`}
                      ${missingSocContentBasic.length > 0 ? `<span class="missing-list">(미이수: ${missingSocContentBasic.join(", ")})</span>` : ''}
                    - 총 학점 (현재 ${dSum}/${reqDoubleTotal}): ${dSum >= reqDoubleTotal ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                </div>
            `;
        } else if (isDouble === "geography") {
            let missingGeoEdu = [];
            geoEduMandatory.forEach(m => { if (!selectedDouble.has(m)) missingGeoEdu.push(m); });
            const geoEduPass = (missingGeoEdu.length === 0);

            let missingGeoContentBasic = [];
            let gBasicCount = 0;
            geoContentBasic.forEach(m => {
                if (selectedDouble.has(m)) gBasicCount++;
                else missingGeoContentBasic.push(m);
            });
            const reqGeoContentBasic = geoContentBasic.length;
            const geoBasicPass = (gBasicCount === reqGeoContentBasic);

            doublePass = (dSum >= reqDoubleTotal) && geoEduPass && geoBasicPass;

            doubleDiagHtml = `
                <div class="status-item">
                    <h4>🗺️ 복수전공 이수 진단 (지리)</h4>
                    - 교과교육 (필수 3과목): ${geoEduPass ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                      ${missingGeoEdu.length > 0 ? `<span class="missing-list">(미이수: ${missingGeoEdu.join(", ")})</span>` : ''}
                    - 교과내용 기본 (9과목 필수): ${geoBasicPass ? '<span class="pass">[충족]</span>' : `<span class="fail">[${gBasicCount}/${reqGeoContentBasic} 미달]</span>`}
                      ${missingGeoContentBasic.length > 0 ? `<span class="missing-list">(미이수: ${missingGeoContentBasic.join(", ")})</span>` : ''}
                    - 총 학점 (현재 ${dSum}/${reqDoubleTotal}): ${dSum >= reqDoubleTotal ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                </div>
            `;
        } else if (isDouble === "other") {
            doublePass = (dSum >= reqDoubleTotal);
            doubleDiagHtml = `
                <div class="status-item">
                    <h4>💡 복수전공 이수 진단 (기타 학과)</h4>
                    - 총 학점 (현재 ${dSum}/${reqDoubleTotal}): ${doublePass ? '<span class="pass">[충족]</span>' : `<span class="fail">[미달]</span>`}
                </div>
            `;
        }

        const freeTotal = total - (Math.min(totalGyoyang, reqGyoyang) + Math.min(tSum + pracSum, reqTeachTotal) + Math.min(mSum, 57) + (isDouble !== "no" ? Math.min(dSum, reqDoubleTotal) : 0));
        document.getElementById("freeTotal").innerText = freeTotal > 0 ? freeTotal : 0;

        const gyoyangAllPass = (iCount === 3) && (ySet.size >= 2 && ySum >= 6) && (tqSet.size === 4 && tqSum >= 14) && (totalGyoyang >= reqGyoyang);
        const teachPass = (teachManCount >= reqTeachMan && teachTheoCount >= 6);
        const majorPass = (mBasicCount === 9 && mSelectCount >= 10);

        const allMet = gyoyangAllPass && teachPass && majorPass && (isDouble === "no" || doublePass) && pracPass;

        const resText = document.getElementById("finalResultText");
        if (total >= targetTotal) {
            if (allMet) { resText.innerHTML = "🎉 완벽합니다! 모든 졸업 요건 달성!"; resText.style.color = "#2ecc71"; } 
            else { resText.innerHTML = "⚠️ 총 학점은 넘었으나 미이수 필수 조건이 있습니다."; resText.style.color = "#f1c40f"; }
        } else {
            resText.innerHTML = `졸업까지 남은 총 학점: ${targetTotal - total}점`; resText.style.color = "#e0e0e0";
        }

        let missingMajorBasic = majorBasic.filter(m => !selectedMajor.has(m));

        document.getElementById("diagnosticStatus").innerHTML = `
            <div class="status-item">
                <h4>📚 교양 이수 진단 (현재 ${totalGyoyang}/${reqGyoyang}학점)</h4>
                - 청람인성 (3과목 필수): ${iCount === 3 ? '<span class="pass">[충족]</span>' : `<span class="fail">[${iCount}/3 미달]</span>`} <br>
                - 청람역량 (2개 영역 이상 & 6학점 이상): ${(ySet.size >= 2 && ySum >= 6) ? '<span class="pass">[충족]</span>' : `<span class="fail">[현재 ${ySet.size}개 영역, ${ySum}학점]</span>`} <br>
                - 청람탐구 (4개 영역 필수 & 14학점 이상): ${(tqSet.size === 4 && tqSum >= 14) ? '<span class="pass">[충족]</span>' : `<span class="fail">[현재 ${tqSet.size}개 영역, ${tqSum}학점]</span>`}
            </div>
            <div class="status-item">
                <h4>🏫 교직 및 필수 요건 진단</h4>
                - 교직소양 필수 (${teachManCount}/${reqTeachMan}): ${teachManCount >= reqTeachMan ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'} <br>
                - 교직이론 선택 (${teachTheoCount}/6과목 이상): ${teachTheoCount >= 6 ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'} <br>
                <div style="margin-top: 8px; border-top: 1px dotted #555; padding-top: 8px;">
                    - 교육실습1 (2학점): ${prac1 ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'}<br>
                    - 교육실습2 (2학점): ${prac2 ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'}<br>
                    - 응급처치 (P/F): ${cpr ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'}<br>
                    - 교육봉사(60시간) (2학점): ${vol ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'}
                </div>
            </div>
            <div class="status-item">
                <h4>📖 본 전공 이수 진단 </h4>
                - 전공 필수 (${mBasicCount}/9과목): ${mBasicCount === 9 ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'}
                  ${missingMajorBasic.length > 0 ? `<span class="missing-list">(미이수: ${missingMajorBasic.join(", ")})</span>` : ''}
                - 전공 선택 (${mSelectCount}/10과목 이상): ${mSelectCount >= 10 ? '<span class="pass">[충족]</span>' : '<span class="fail">[미달]</span>'}
            </div>
            ${doubleDiagHtml}
        `;

        if(doSave) saveData();
    }

    window.onload = loadData;

</script>

</body>
</html>
